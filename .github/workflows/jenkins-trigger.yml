# Fired when a PR is merged into the default branch. POSTs the merge-commit SHA + PR
# metadata to the Jenkins build job for this repo.
#
# Aligned with Platform-LSS/plss-ways-of-working technical-ways-of-working.md §A.7.
#
# Configuration is managed at the GitHub org + per-repo variable level.
#
# Per-repo + org-level config consumed:
#   vars.JENKINS_URL       https://cicd.rxmaster.ai      (org-level)
#   vars.JENKINS_USER      Jenkins user w/ Job/Build     (org-level)
#   vars.JENKINS_JOB_PATH  job/internal-tools/job/langfuse  (per-repo)
#   secrets.JENKINS_TOKEN  API token for JENKINS_USER    (org-level)

name: jenkins-trigger
on:
  pull_request:
    branches: [main]
    types: [closed]
jobs:
  trigger:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fire Jenkins build
        env:
          JENKINS_URL: ${{ vars.JENKINS_URL }}
          JENKINS_USER: ${{ vars.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          JENKINS_JOB_PATH: ${{ vars.JENKINS_JOB_PATH }}
          BRANCH: ${{ github.event.pull_request.base.ref }}
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          TRIGGER_ACTOR: ${{ github.actor }}
        run: |
          set -eu
          echo "PR #${PR_NUMBER}: '${PR_TITLE}'"
          echo "Author: ${PR_AUTHOR}    Merged by: ${TRIGGER_ACTOR}"
          echo "Merged ${SHA} into ${BRANCH}"
          echo "Firing: ${JENKINS_URL}/${JENKINS_JOB_PATH}/buildWithParameters"

          curl --silent --show-error --fail-with-body \
            -u "${JENKINS_USER}:${JENKINS_TOKEN}" \
            -X POST \
            --data-urlencode "BRANCH=${BRANCH}" \
            --data-urlencode "SHA=${SHA}" \
            --data-urlencode "PR_NUMBER=${PR_NUMBER}" \
            --data-urlencode "PR_TITLE=${PR_TITLE}" \
            --data-urlencode "PR_AUTHOR=${PR_AUTHOR}" \
            --data-urlencode "TRIGGER_ACTOR=${TRIGGER_ACTOR}" \
            "${JENKINS_URL}/${JENKINS_JOB_PATH}/buildWithParameters" \
            -o /tmp/jenkins-response \
            -w "HTTP %{http_code} (Location: %header{location})\n"

          echo
          echo "Done. Build queued in Jenkins; watch:"
          echo "  ${JENKINS_URL}/${JENKINS_JOB_PATH}/"
